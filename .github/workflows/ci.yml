name: ci
run-name: CI
on:
  push:
    branches-ignore:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get -qq install -y cppcheck
      - name: Configure CMake
        run: cmake -S . -B build
      - name: Run lint
        run: cmake --build build --target lint

  verify-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install dependencies
        run: pip3 install online-judge-tools online-judge-verify-helper
      - name: Install AtCoder Library
        run: |
          wget -q https://github.com/atcoder/ac-library/archive/refs/tags/v1.6.zip -O /tmp/acl.zip
          unzip -q /tmp/acl.zip -d /tmp/
          sudo cp -r /tmp/ac-library-1.6/atcoder /usr/local/include/
      - uses: actions/cache@v4
        with:
          path: .verify-helper/cache
          key: verify-helper-${{ github.sha }}
          restore-keys: |
            verify-helper-
      - name: Configure CMake
        run: cmake -S . -B build
      - name: Run verification
        run: cmake --build build --target verify
