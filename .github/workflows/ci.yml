name: ci
run-name: CI
on:
  - push
jobs:
  verify-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install dependencies
        run: pip3 install online-judge-tools online-judge-verify-helper
      - name: Install AtCoder Library
        run: |
          wget -q https://github.com/atcoder/ac-library/archive/refs/tags/v1.6.zip -O /tmp/acl.zip
          unzip -q /tmp/acl.zip -d /tmp/
          sudo cp -r /tmp/ac-library-1.6/atcoder /usr/local/include/
      - uses: actions/cache@v4
        with:
          path: .verify-helper/cache
          key: verify-helper-${{ github.sha }}
          restore-keys: |
            verify-helper-
      - name: Run verification
        run: oj-verify run

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: verify-libs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install dependencies
        run: pip3 install online-judge-tools online-judge-verify-helper
      - name: Install AtCoder Library
        run: |
          wget -q https://github.com/atcoder/ac-library/archive/refs/tags/v1.6.zip -O /tmp/acl.zip
          unzip -q /tmp/acl.zip -d /tmp/
          sudo cp -r /tmp/ac-library-1.6/atcoder /usr/local/include/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Generate docs
        run: oj-verify docs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .verify-helper/markdown
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
