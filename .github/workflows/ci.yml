name: ci
run-name: CI
on:
  - push
jobs:
  verify-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pip3 install setuptools online-judge-tools rime
      - run: ./verify.sh

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: verify-libs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen doxygen-latex graphviz
      - name: Generate docs
        run: doxygen
      - name: Upload Pages artifact
        uses: actions/upload-pages@v3
        with:
          path: html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
